<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Power System Quiz</title>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="container">

  <h1>⚡ Power System Quiz</h1>

  <div class="settings">

    <label>Choose Subject</label>

    <select id="subjectSelect">
      <option value="all">All Subjects</option>
      <option value="facts">FACTS</option>
      <option value="voltage">Voltage Control</option>
      <option value="stability">Stability</option>
    </select>

    <label>Question Order</label>

    <select id="orderSelect">
      <option value="normal">Ordered</option>
      <option value="random">Random</option>
    </select>

    <label class="check">
      <input type="checkbox" id="shuffleChoices">
      Shuffle Choices
    </label>

    <button onclick="toggleTheme()">
      🌙 Toggle Theme
    </button>

    <button onclick="startQuiz()">
      🚀 Start Quiz
    </button>

  </div>

  <div id="quizContainer"></div>

  <div class="submitArea">
    <button id="submitBtn" onclick="submitQuiz()" style="display:none;">
      ✅ Submit Answers
    </button>
  </div>

  <div id="result"></div>

</div>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>

<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
